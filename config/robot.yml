shutdown_in: 120   # seconds until the program auto-exits (prevents runaway robots)

drive:
  kinematics:
    type: differential
    wheel_radius: 0.0345   # metres — measure with calipers
    wheelbase: 0.16        # metres — distance between left and right wheel contact points
    left_motor: left_motor
    right_motor: right_motor

  # Chassis-level velocity controller.
  # These values are produced by `raccoon calibrate` — run it once per robot to
  # characterise your drivetrain and write accurate values here.
  #
  # The controller output is corrected chassis velocity (same units as input):
  #   vx in m/s, vy in m/s, wz in rad/s.
  # It is NOT a raw motor duty cycle — do not set kV to a large number.
  #
  # Good starting defaults until you calibrate:
  #   ff.kS = 0.0  (static friction offset; calibrate sets this to ~0.05–0.15)
  #   ff.kV = 1.0  (gain; leave at 1.0 — the STM32 handles actual motor PID)
  #   ff.kA = 0.0  (acceleration feed-forward; rarely needed)
  #   pid all 0.0  (add a small kp only if straight-line drift is noticeable)
  vel_config:
    vx:
      pid:
        kp: 0.0
        ki: 0.0
        kd: 0.0
      ff:
        kS: 0.0   # set by raccoon calibrate
        kV: 1.0
        kA: 0.0
    vy:           # unused for differential drive (robot cannot move sideways)
      pid:
        kp: 0.0
        ki: 0.0
        kd: 0.0
      ff:
        kS: 0.0
        kV: 1.0
        kA: 0.0
    wz:
      pid:
        kp: 0.0
        ki: 0.0
        kd: 0.0
      ff:
        kS: 0.0   # set by raccoon calibrate
        kV: 1.0
        kA: 0.0

odometry:
  type: FusedOdometry
  config:
    bemf_trust: 1.0   # 1.0 = trust encoders fully; lower if IMU heading is more reliable

# High-level motion PID — controls how drive_cm / turn_deg steps follow their
# distance and heading targets. Tune these if the robot overshoots or oscillates.
motion_pid:
  distance:
    kp: 3.0
    ki: 0.0
    kd: 0.0
    integral_max: 10.0
    integral_deadband: 0.01
    derivative_lpf_alpha: 0.5
    output_min: -10.0
    output_max: 10.0
  heading:
    kp: 6.0
    ki: 0.0
    kd: 0.15
    integral_max: 10.0
    integral_deadband: 0.01
    derivative_lpf_alpha: 0.5
    output_min: -10.0
    output_max: 10.0
  velocity_ff: 1.0
  distance_tolerance_m: 0.005      # stop when within 5 mm of target
  angle_tolerance_rad: 0.017       # stop when within ~1° of target heading

  # Saturation handling — prevents integral windup when motors hit their limits.
  saturation_derating_factor: 0.85
  saturation_min_scale: 0.2
  saturation_recovery_rate: 0.02
  saturation_hold_cycles: 5
  saturation_recovery_threshold: 0.95
  heading_saturation_derating_factor: 0.85
  heading_min_scale: 0.25
  heading_recovery_rate: 0.05
  heading_saturation_error_rad: 0.01
  heading_recovery_error_rad: 0.005

  # Motion constraints — REQUIRED. The robot cannot move if these are zero or missing.
  # max_velocity: top speed in m/s (linear) or rad/s (angular)
  # acceleration: how fast to ramp up to max speed (m/s² or rad/s²)
  # deceleration: how fast to slow down before reaching the target (m/s² or rad/s²)
  #
  # These values were measured for a standard Wombat + two DC motors.
  # Run `raccoon calibrate` to compute accurate values for your robot.
  linear:
    max_velocity: 0.24    # m/s  (~24 cm/s)
    acceleration: 0.28    # m/s²
    deceleration: 2.05    # m/s² — higher than accel for precise stopping
  lateral:
    max_velocity: 0.0     # differential drive cannot strafe
    acceleration: 0.0
    deceleration: 0.0
  angular:
    max_velocity: 2.0     # rad/s (~115°/s)
    acceleration: 3.0     # rad/s²
    deceleration: 3.0     # rad/s²

physical:
  width_cm: 18.0
  length_cm: 22.0
  sensors:
    - name: front_left_ir_sensor
      x_cm: -6.0
      y_cm: 13.0
      clearance_cm: 1.0
    - name: front_right_ir_sensor
      x_cm: 6.0
      y_cm: 13.0
      clearance_cm: 1.0
  rotation_center:
    x_cm: 9.0
    y_cm: 7.0
  start_pose:
    x_cm: 0.0
    y_cm: 0.0
    theta_deg: 90.0
